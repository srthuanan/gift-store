<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quét Mã QR Nhé ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: #333;
        }
        .qr-container {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { margin-top: 0; color: #ff416c; font-size: 2rem; }
        #qrcode { 
            margin: 30px auto; 
            display: flex; 
            justify-content: center; 
            padding: 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(255, 65, 108, 0.1);
        }
        p { text-align: center; color: #555; line-height: 1.6; font-size: 1.1rem; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="qr-container">
        <h1>Quét Mã Nhé! 💕</h1>
        <p>Gửi mã này cho người ấy quét (bằng camera hoặc Zalo) để mở xem điều bất ngờ nhé!</p>
        <div id="qrcode"></div>
    </div>

    <script>
        const currentUrl = window.location.href;
        // Chuyển URL hiện tại sang file index.html
        let loveWebUrl = currentUrl.replace('qr.html', 'index.html');
        
        // Tạo QR Code
        new QRCode(document.getElementById("qrcode"), {
            text: loveWebUrl,
            width: 250,
            height: 250,
            colorDark : "#ff2a5f",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
